<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Memorable – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#e50914;--red2:#b81d24;--bg:#141414;--card:#1f1f1f;--muted:#aaa;--border:#333}
body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.hero-bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a0505 40%,#0d0d1a 100%)}
.glow{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12}
.glow-r{width:500px;height:500px;background:#e50914;top:-100px;right:-100px}
.glow-b{width:400px;height:400px;background:#1a1aff;bottom:-100px;left:-50px}
nav{position:relative;z-index:10;display:flex;align-items:center;padding:20px 60px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--red);letter-spacing:2px}
.auth-wrap{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{background:rgba(20,20,20,0.92);backdrop-filter:blur(20px);border:1px solid #2a2a2a;border-radius:12px;padding:50px 48px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,0.8)}
.auth-card h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;margin-bottom:6px}
.auth-card p{color:var(--muted);font-size:.9rem;margin-bottom:32px}
.tab-switch{display:flex;gap:0;margin-bottom:32px;background:#111;border-radius:8px;padding:4px}
.tab-switch button{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;border-radius:6px;transition:.2s}
.tab-switch button.active{background:var(--red);color:#fff}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.form-group input{width:100%;padding:13px 16px;background:#111;border:1px solid var(--border);border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;transition:.2s}
.form-group input:focus{outline:none;border-color:var(--red);background:#1a1a1a}
.btn-primary{width:100%;padding:14px;background:var(--red);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1.5px;border-radius:8px;cursor:pointer;transition:.2s;margin-top:8px}
.btn-primary:hover{background:var(--red2);transform:translateY(-1px)}
.msg{font-size:.85rem;padding:10px 14px;border-radius:6px;margin-top:14px;display:none}
.msg.error{background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.3);color:#ff6b6b}
.msg.success{background:rgba(46,213,115,.1);border:1px solid rgba(46,213,115,.3);color:#2ed573}
.demo-hint{margin-top:20px;text-align:center;font-size:.82rem;color:#555;padding:12px;background:#0d0d0d;border-radius:6px;border:1px dashed #2a2a2a}
.demo-hint span{color:var(--red);cursor:pointer;font-weight:500}
</style>
</head>
<body>
<div class="hero-bg"><div class="glow glow-r"></div><div class="glow glow-b"></div></div>
<nav><div class="logo">Memorable</div></nav>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p>Sign in to continue streaming</p>
    <div class="tab-switch">
      <button class="active" onclick="showTab('login',this)">Sign In</button>
      <button onclick="showTab('register',this)">Register</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
      <button class="btn-primary" onclick="doLogin()">SIGN IN</button>
      <div class="msg" id="l-msg"></div>
      <div class="demo-hint">Demo: <span onclick="fillDemo()">demo@netflix.com / demo123</span></div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>Full Name</label><input type="text" id="r-name" placeholder="Arjun Sharma"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="r-email" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="r-phone" placeholder="9876543210"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="r-pass" placeholder="Min 6 characters"/></div>
      <button class="btn-primary" onclick="doRegister()">CREATE ACCOUNT</button>
      <div class="msg" id="r-msg"></div>
    </div>
  </div>
</div>
<script>
const API='http://localhost:3000/api';
function showTab(tab,btn){document.querySelectorAll('.tab-switch button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('login-form').style.display=tab==='login'?'block':'none';document.getElementById('register-form').style.display=tab==='register'?'block':'none';}
function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className=`msg ${type}`;el.style.display='block';}
function fillDemo(){document.getElementById('l-email').value='demo@netflix.com';document.getElementById('l-pass').value='demo123';}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass)return showMsg('l-msg','Please fill all fields','error');
  try{
    const r=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!r.ok)return showMsg('l-msg',d.error||'Login failed','error');
    sessionStorage.setItem('user',JSON.stringify(d.user));
    window.location.href='browse.html';
  }catch(e){showMsg('l-msg','Cannot reach server. Is backend running?','error');}
}
async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const phone=document.getElementById('r-phone').value.trim();
  const pass=document.getElementById('r-pass').value;
  if(!name||!email||!pass)return showMsg('r-msg','Please fill all required fields','error');
  try{
    const r=await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,phone,password:pass})});
    const d=await r.json();
    if(!r.ok)return showMsg('r-msg',d.error||'Registration failed','error');
    sessionStorage.setItem('user',JSON.stringify({User_ID:d.user_id,Name:d.name,Email:d.email}));
    window.location.href='browse.html';
  }catch(e){showMsg('r-msg','Cannot reach server. Is backend running?','error');}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if(sessionStorage.getItem('user'))window.location.href='browse.html';
</script>
</body>
</html>
