<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Browse – Memorable</title>
<meta name="description" content="Browse our extensive catalog of 200+ movies and series on Memorable – your premium OTT platform."/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#e50914;--red2:#b81d24;--red-glow:rgba(229,9,20,.35);
  --bg:#0a0a0a;--bg2:#111;--card:#161616;--card-hover:#1e1e1e;
  --muted:#888;--muted2:#666;--border:#1e1e1e;--sidebar:240px;
  --glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);
}
body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;overflow-x:hidden}
::selection{background:var(--red);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}::-webkit-scrollbar-track{background:transparent}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:#080808;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--red);padding:28px 24px 20px;letter-spacing:3px;border-bottom:1px solid var(--border);text-shadow:0 0 30px var(--red-glow)}
.sidebar nav{flex:1;padding:16px 0}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:13px 24px;color:var(--muted);text-decoration:none;font-size:.9rem;transition:.25s;border-left:3px solid transparent}
.sidebar nav a svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;transition:.25s}
.sidebar nav a:hover,.sidebar nav a.active{color:#fff;background:rgba(229,9,20,.08);border-left-color:var(--red)}
.sidebar-footer{padding:20px 24px;border-top:1px solid var(--border)}
.sidebar-footer .uname{font-size:.85rem;color:#fff;font-weight:500;margin-bottom:2px}
.sidebar-footer .uemail{font-size:.75rem;color:var(--muted)}
.sidebar-footer button{display:inline-block;margin-top:12px;padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.8rem;cursor:pointer;transition:.25s;font-family:'DM Sans',sans-serif}
.sidebar-footer button:hover{border-color:var(--red);color:var(--red)}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;padding:32px 40px 60px}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#1a0505 0%,#0d0d1a 50%,#0a1a0a 100%);border-radius:20px;padding:44px 52px;margin-bottom:32px;border:1px solid #1e1e1e;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;background:radial-gradient(circle,rgba(229,9,20,.12),transparent 70%);border-radius:50%;filter:blur(40px)}
.hero::after{content:'';position:absolute;bottom:-40px;left:30%;width:200px;height:200px;background:radial-gradient(circle,rgba(80,40,200,.08),transparent 70%);border-radius:50%;filter:blur(30px)}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;letter-spacing:3px;position:relative;z-index:1}
.hero h1 span{color:var(--red)}
.hero p{color:#777;margin-top:8px;font-size:.95rem;position:relative;z-index:1}
.hero .stats{display:flex;gap:32px;margin-top:20px;position:relative;z-index:1}
.hero .stat{text-align:center}
.hero .stat .num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--red);letter-spacing:1px}
.hero .stat .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ── CONTROLS ── */
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px}
.search-box{position:relative;flex:1;min-width:240px;max-width:400px}
.search-box input{width:100%;padding:11px 16px 11px 42px;background:#141414;border:1px solid var(--border);border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.88rem;transition:.3s}
.search-box input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(229,9,20,.15)}
.search-box input::placeholder{color:#555}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#555;stroke-width:2;fill:none}
.sort-select{padding:10px 14px;background:#141414;border:1px solid var(--border);border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:.3s}
.sort-select:focus{outline:none;border-color:var(--red)}
.sort-select option{background:#1a1a1a}
.results-count{font-size:.82rem;color:var(--muted);margin-left:auto}

/* ── GENRE TABS ── */
.genre-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.genre-tab{padding:7px 18px;border-radius:24px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:.3s;font-family:'DM Sans',sans-serif;letter-spacing:.3px;position:relative;overflow:hidden}
.genre-tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red),#ff4d4d);opacity:0;transition:.3s}
.genre-tab span{position:relative;z-index:1}
.genre-tab:hover{border-color:var(--red);color:#fff}
.genre-tab.active{border-color:var(--red);color:#fff}
.genre-tab.active::before{opacity:1}

/* ── SECTION TITLE ── */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1.5px;color:#ddd}
.section-header .line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}

/* ── GRID ── */
.content-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}

/* ── CARD ── */
.movie-card{background:#111;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease;position:relative}
.movie-card:hover{transform:scale(1.05);box-shadow:0 16px 40px rgba(0,0,0,.6),0 0 20px rgba(229,9,20,.1)}

/* ── POSTER AREA ── */
.poster{height:220px;position:relative;overflow:hidden}
.poster::before{content:'';position:absolute;inset:0;z-index:0}

/* ── RATING BADGE (top-right corner) ── */
.rating{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:4px;z-index:3;letter-spacing:.5px;line-height:1.2}

/* ── INFO SECTION ── */
.info{padding:14px 14px 10px}
.info h3{font-size:.95rem;font-weight:600;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#fff}
.info .meta{font-size:.75rem;color:#888;margin-bottom:8px;letter-spacing:.2px}
.genre-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.68rem;font-weight:500;letter-spacing:.3px;width:fit-content;margin-bottom:10px}

/* ── WATCH BUTTON ── */
.watch-btn{width:calc(100% - 28px);margin:0 14px 14px;padding:9px;border:1px solid #333;background:transparent;color:#999;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;transition:.3s;letter-spacing:.3px;text-align:center}
.watch-btn:hover{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 4px 16px rgba(229,9,20,.3)}

/* ── GENRE COLORS ── */
.genre-action{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.25)}
.genre-thriller{background:rgba(192,57,43,.15);color:#e74c3c;border:1px solid rgba(192,57,43,.25)}
.genre-comedy{background:rgba(241,196,15,.15);color:#f1c40f;border:1px solid rgba(241,196,15,.25)}
.genre-drama{background:rgba(155,89,182,.15);color:#bb86fc;border:1px solid rgba(155,89,182,.25)}
.genre-sci-fi{background:rgba(52,152,219,.15);color:#3498db;border:1px solid rgba(52,152,219,.25)}
.genre-crime{background:rgba(230,126,34,.15);color:#e67e22;border:1px solid rgba(230,126,34,.25)}
.genre-horror{background:rgba(231,76,60,.15);color:#ff4444;border:1px solid rgba(231,76,60,.3)}
.genre-fantasy{background:rgba(22,160,133,.15);color:#1abc9c;border:1px solid rgba(22,160,133,.25)}
.genre-romance{background:rgba(255,105,180,.15);color:#ff69b4;border:1px solid rgba(255,105,180,.25)}

/* ── POSTER GRADIENTS PER GENRE ── */
.card-genre-action .poster::before{background:linear-gradient(180deg,#1a0a08 0%,#0d0604 60%,#000 100%)}
.card-genre-thriller .poster::before{background:linear-gradient(180deg,#1a0808 0%,#0d0404 60%,#000 100%)}
.card-genre-comedy .poster::before{background:linear-gradient(180deg,#1a1808 0%,#0d0c04 60%,#000 100%)}
.card-genre-drama .poster::before{background:linear-gradient(180deg,#140a1a 0%,#0a050d 60%,#000 100%)}
.card-genre-sci-fi .poster::before{background:linear-gradient(180deg,#081018 0%,#04080c 60%,#000 100%)}
.card-genre-crime .poster::before{background:linear-gradient(180deg,#1a1008 0%,#0d0804 60%,#000 100%)}
.card-genre-horror .poster::before{background:linear-gradient(180deg,#1a0505 0%,#0d0303 60%,#000 100%)}
.card-genre-fantasy .poster::before{background:linear-gradient(180deg,#081a14 0%,#040d0a 60%,#000 100%)}
.card-genre-romance .poster::before{background:linear-gradient(180deg,#1a0818 0%,#0d040c 60%,#000 100%)}

/* ── LOAD MORE ── */
.load-more-wrap{text-align:center;margin-top:36px}
.load-more-btn{padding:12px 48px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;font-size:.9rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.3s;letter-spacing:.5px}
.load-more-btn:hover{border-color:var(--red);color:var(--red);box-shadow:0 0 20px rgba(229,9,20,.15)}

/* ── EMPTY ── */
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state .icon{font-size:4rem;margin-bottom:16px;opacity:.3}
.empty-state p{font-size:.95rem}
.empty-state .sub{font-size:.8rem;color:var(--muted2);margin-top:6px}

/* ── TOAST ── */
.toast{position:fixed;bottom:30px;right:30px;background:#1a1a1a;border:1px solid var(--border);border-radius:12px;padding:14px 22px;font-size:.87rem;z-index:9999;transform:translateY(100px);opacity:0;transition:.4s cubic-bezier(.4,0,.2,1);box-shadow:0 12px 40px rgba(0,0,0,.6);backdrop-filter:blur(10px)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(46,213,115,.4);color:#2ed573}
.toast.error{border-color:rgba(229,9,20,.4);color:#ff6b6b}

/* ── ANIMATIONS ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.movie-card{animation:fadeInUp .4s ease both}

/* ── MODAL ── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:9000;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:60px 20px}
.modal-overlay.active{display:flex}
@keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-card{background:#111;border-radius:14px;width:100%;max-width:620px;overflow:hidden;animation:modalIn .35s ease both;box-shadow:0 30px 80px rgba(0,0,0,.7);position:relative}
.modal-poster{height:120px;position:relative;overflow:hidden}
.modal-poster::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,#1a1a1a 0%,#000 100%)}
.modal-poster::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#111)}
.modal-body{padding:0 32px 28px}
.modal-body h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;margin-bottom:10px;line-height:1.1}
.modal-meta{display:flex;align-items:center;gap:10px;font-size:.88rem;color:#aaa;margin-bottom:16px;flex-wrap:wrap}
.modal-meta .age-badge{background:var(--red);color:#fff;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.5px}
.modal-rating-row{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.imdb-badge{background:#f5c518;color:#000;font-weight:700;font-size:.78rem;padding:5px 12px;border-radius:6px;letter-spacing:.3px}
.modal-stars{color:#f5c518;font-size:1rem;letter-spacing:2px}
.modal-desc{color:#bbb;font-size:.9rem;line-height:1.65;margin-bottom:24px}
.modal-info-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:18px 22px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-info-box .info-label{font-size:.7rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.modal-info-box .info-value{font-size:.92rem;font-weight:500;color:#ddd}
.modal-buttons{display:flex;gap:10px}
.modal-buttons button{flex:1;padding:13px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:.3s;letter-spacing:.5px;border:none;text-transform:uppercase}
.btn-watch{background:var(--red);color:#fff}
.btn-watch:hover{background:#ff1a25;box-shadow:0 6px 20px rgba(229,9,20,.4)}
.btn-watchlist{background:#222;color:#ccc;border:1px solid #333 !important}
.btn-watchlist:hover{border-color:var(--red) !important;color:#fff}
.btn-close-modal{background:#222;color:#888;border:1px solid #333 !important}
.btn-close-modal:hover{color:#fff;border-color:#555 !important}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:20px 16px}
  .hero{padding:28px 24px}
  .hero h1{font-size:2rem}
  .content-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .modal-overlay{padding:30px 12px}
  .modal-body{padding:0 20px 22px}
  .modal-body h1{font-size:1.6rem}
  .modal-buttons{flex-direction:column}
}
</style>

<script>
// ════════════════════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════════════════════
const u=sessionStorage.getItem('user');
if(!u)window.location.href='index.html';
const user=JSON.parse(u||'{}');
document.getElementById('uname').textContent=user.Name||'';
document.getElementById('uemail').textContent=user.Email||'';
function logout(){sessionStorage.removeItem('user');window.location.href='index.html';}

// ════════════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════════════
const API='http://localhost:3000/api';
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}

// ════════════════════════════════════════════════════════════════
//  WATCH MOVIE (API call)
// ════════════════════════════════════════════════════════════════
async function watchMovie(movie){
  try{
    const r=await fetch(`${API}/watch`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        user_id:user.User_ID,
        title:movie.title,
        genre:movie.genre,
        language:movie.language,
        duration:movie.duration
      })
    });
    const d=await r.json();
    if(r.ok){
      toast(`Added '${movie.title}' to watch history ✓`,'success');
    }else{
      toast(d.error||'Failed to save','error');
    }
  }catch(e){
    toast('Server unreachable — is backend running?','error');
  }
}

function getDesc(m){return movieDesc[m.id]||`${m.title} is a captivating ${m.genre.toLowerCase()} ${m.duration==='Series'?'series':'film'} that delivers an unforgettable experience with stellar performances and a gripping narrative.`;}
function getAgeRating(m){const r=parseFloat(m.rating);return r>=8.5?'R':r>=7.5?'TV-MA':r>=6.5?'TV-14':'PG-13';}
function getYear(m){const d=m.duration;return d==='Series'?'Series':['Action','Thriller'].includes(m.genre)?'2023':['Drama','Crime'].includes(m.genre)?'2022':['Sci-Fi','Horror'].includes(m.genre)?'2021':['Fantasy','Comedy'].includes(m.genre)?'2020':'2019';}
function getStars(r){const n=Math.round(parseFloat(r)/2);return '★'.repeat(n)+'☆'.repeat(5-n);}

function openModal(id){
  const m=movies.find(x=>x.id===id);
  if(!m)return;
  document.getElementById('modalTitle').textContent=m.title;
  const ageRating=getAgeRating(m);
  const year=getYear(m);
  document.getElementById('modalMeta').innerHTML=
    `<span>${m.language}</span><span>${m.duration}</span><span class="age-badge">${ageRating}</span><span>${year}</span>`;
  document.getElementById('modalImdb').textContent=`IMDB ${m.rating}/10`;
  document.getElementById('modalStars').textContent=getStars(m.rating);
  document.getElementById('modalDesc').textContent=getDesc(m);
  document.getElementById('modalInfo').innerHTML=
    `<div class="info-item"><div class="info-label">Genre</div><div class="info-value">${m.genre}</div></div>`+
    `<div class="info-item"><div class="info-label">Type</div><div class="info-value">${m.duration==='Series'?'Series':'Movie'}</div></div>`+
    `<div class="info-item"><div class="info-label">Content ID</div><div class="info-value">${m.id}</div></div>`;
  // Wire up buttons
  document.getElementById('modalWatchBtn').onclick=()=>{closeModal();watchMovie(m);};
  document.getElementById('modalWatchlistBtn').onclick=()=>{toast(`Added '${m.title}' to watchlist`,'success');};
  document.getElementById('movieModal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('movieModal').classList.remove('active');
  document.body.style.overflow='';
}

// ════════════════════════════════════════════════════════════════
//  GENRE ICONS
// ════════════════════════════════════════════════════════════════
const genreIcons={Action:'⚡',Thriller:'🎯',Drama:'🎭',Comedy:'😂','Sci-Fi':'🚀',Crime:'🔫',Horror:'👻',Fantasy:'🐉',Romance:'💕'};
const genreClasses={Action:'genre-action',Thriller:'genre-thriller',Drama:'genre-drama',Comedy:'genre-comedy','Sci-Fi':'genre-sci-fi',Crime:'genre-crime',Horror:'genre-horror',Fantasy:'genre-fantasy',Romance:'genre-romance'};

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let activeGenre='';
let displayCount=40; // show 40 initially
const PAGE_SIZE=40;
let debounceTimer;

// ════════════════════════════════════════════════════════════════
//  INIT: build genre tabs + stats
// ════════════════════════════════════════════════════════════════
(function init(){
  // Stats
  const genres=[...new Set(movies.map(m=>m.genre))];
  const langs=[...new Set(movies.map(m=>m.language))];
  document.getElementById('totalCount').textContent=movies.length;
  document.getElementById('genreCount').textContent=genres.length;
  document.getElementById('langCount').textContent=langs.length;

  // Genre tabs
  const tabsHTML=`<button class="genre-tab active" onclick="setGenre('',this)"><span>All (${movies.length})</span></button>`+
    genres.map(g=>{
      const count=movies.filter(m=>m.genre===g).length;
      return `<button class="genre-tab" onclick="setGenre('${g}',this)"><span>${g} (${count})</span></button>`;
    }).join('');
  document.getElementById('genreTabs').innerHTML=tabsHTML;

  renderMovies();
})();

// ════════════════════════════════════════════════════════════════
//  SET GENRE
// ════════════════════════════════════════════════════════════════
function setGenre(genre,btn){
  activeGenre=genre;
  displayCount=PAGE_SIZE;
  document.querySelectorAll('.genre-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sectionTitle').textContent=genre?genre:'All Titles';
  renderMovies();
}

// ════════════════════════════════════════════════════════════════
//  FILTER + SORT
// ════════════════════════════════════════════════════════════════
function getFiltered(){
  const search=document.getElementById('searchInput').value.toLowerCase().trim();
  const sort=document.getElementById('sortSelect').value;

  let filtered=movies.filter(m=>{
    if(activeGenre && m.genre!==activeGenre) return false;
    if(search && !m.title.toLowerCase().includes(search) && !m.language.toLowerCase().includes(search)) return false;
    return true;
  });

  switch(sort){
    case 'title-asc': filtered.sort((a,b)=>a.title.localeCompare(b.title)); break;
    case 'title-desc': filtered.sort((a,b)=>b.title.localeCompare(a.title)); break;
    case 'rating-desc': filtered.sort((a,b)=>parseFloat(b.rating)-parseFloat(a.rating)); break;
    case 'rating-asc': filtered.sort((a,b)=>parseFloat(a.rating)-parseFloat(b.rating)); break;
  }
  return filtered;
}

// ════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════
function renderMovies(){
  const filtered=getFiltered();
  const visible=filtered.slice(0,displayCount);
  const grid=document.getElementById('grid');

  document.getElementById('resultsCount').textContent=`${filtered.length} title${filtered.length!==1?'s':''}`;

  if(!visible.length){
    grid.innerHTML=`<div class="empty-state"><div class="icon">🎬</div><p>No titles found</p><div class="sub">Try a different search or genre</div></div>`;
    document.getElementById('loadMoreWrap').style.display='none';
    return;
  }

  grid.innerHTML=visible.map((m,i)=>{
    const gc=genreClasses[m.genre]||'genre-action';
    const cardGenreClass='card-genre-'+m.genre.toLowerCase().replace(/[^a-z]/g,'-');
    const delay=Math.min(i*30,600);
    return `
    <div class="movie-card ${cardGenreClass}" style="animation-delay:${delay}ms" onclick="openModal(${m.id})">
      <div class="poster"></div>
      <div class="rating">${m.rating>=8.0?'TV-MA':m.rating>=7.0?'TV-14':'TV-PG'}</div>
      <div class="info">
        <h3>${m.title}</h3>
        <p class="meta">${m.language} • ${m.duration}</p>
        <span class="genre-badge ${gc}">${m.genre}</span>
      </div>
      <button class="watch-btn" onclick="event.stopPropagation();watchMovie(movies.find(x=>x.id===${m.id}))">Watch Now</button>
    </div>`;
  }).join('');

  // Show/hide load more
  const wrap=document.getElementById('loadMoreWrap');
  if(displayCount<filtered.length){
    wrap.style.display='block';
    document.getElementById('loadMoreBtn').textContent=`Load More (${filtered.length-displayCount} remaining)`;
  }else{
    wrap.style.display='none';
  }
}

// ════════════════════════════════════════════════════════════════
//  LOAD MORE
// ════════════════════════════════════════════════════════════════
function loadMore(){
  displayCount+=PAGE_SIZE;
  renderMovies();
  // Smooth scroll to newly loaded cards
}

// ════════════════════════════════════════════════════════════════
//  DEBOUNCE SEARCH
// ════════════════════════════════════════════════════════════════
function debounceRender(){
  clearTimeout(debounceTimer);
  displayCount=PAGE_SIZE;
  debounceTimer=setTimeout(renderMovies,250);
}
</script>
